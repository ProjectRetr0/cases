<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кейсы: Трафик и Воронки</title>
  <meta name="description" content="12 кейсов по трафику, автоворонкам и лидогенерации — регистрации, заявки, рост LTV, премиум-ниши.">
  <style>
    :root {
      --bg-color: #1a1a1a;
      --card-bg: #262626;
      --text-main: #f0f0f0;
      --text-muted: #a3a3a3;
      --accent-orange: #ff5722;
      --tag-bg: #f5f5f5;
      --tag-text: #1a1a1a;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 40px 20px 60px;
      background: var(--bg-color);
      color: var(--text-main);
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
    }

    body.modal-open { overflow: hidden; }

    .container { max-width: 1400px; margin: 0 auto; }

    .header { text-align: center; margin-bottom: 40px; }

    .header h1 {
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      margin: 0 0 10px;
      color: #fff;
    }

    .header p {
      color: var(--text-muted);
      font-size: 1.1rem;
      margin: 0;
    }

    .footer-actions {
      display: flex;
      justify-content: center;
      margin-top: 32px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn-primary {
      background: var(--accent-orange);
      color: #fff;
      box-shadow: 0 4px 20px rgba(255, 87, 34, 0.35);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(255, 87, 34, 0.45);
    }

    .hint {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    .cases-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 30px;
    }

    .case-card {
      margin: 0;
      padding: 0;
      border: none;
      border-radius: 16px;
      overflow: hidden;
      background: var(--card-bg);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      cursor: pointer;
      transition: transform 0.35s ease, box-shadow 0.35s ease;
      transform-origin: center center;
      position: relative;
    }

    .case-card:hover,
    .case-card:focus-visible {
      transform: scale(1.06);
      box-shadow: 0 20px 50px rgba(255, 87, 34, 0.2);
      z-index: 2;
      outline: none;
    }

    .case-card img {
      display: block;
      width: 100%;
      height: auto;
      pointer-events: none;
    }

    .case-card::after {
      content: "Нажмите для подробностей";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 12px;
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.85));
      color: #fff;
      font-size: 0.8rem;
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .case-card:hover::after,
    .case-card:focus-visible::after { opacity: 1; }

    .site-footer {
      margin-top: 60px;
      padding-top: 24px;
      border-top: 1px solid #333;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* Modal */
    .modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal[hidden] { display: none; }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.82);
      backdrop-filter: blur(4px);
    }

    .modal-dialog {
      position: relative;
      width: min(640px, 100%);
      max-height: 90vh;
      overflow-y: auto;
      background: #fff;
      color: #1a1a1a;
      border-radius: 20px;
      padding: 32px 28px 28px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      background: #f0f0f0;
      color: #333;
      font-size: 1.4rem;
      line-height: 1;
      cursor: pointer;
      transition: background 0.2s;
    }

    .modal-close:hover { background: #e0e0e0; }

    .modal-title {
      margin: 0 40px 12px 0;
      font-size: 1.4rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .modal-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .tag {
      background: var(--accent-orange);
      color: #fff;
      padding: 4px 14px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 600;
    }

    .modal-section { margin-bottom: 22px; }

    .modal-section h3 {
      margin: 0 0 10px;
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent-orange);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .modal-section ul {
      margin: 0;
      padding-left: 20px;
    }

    .modal-section li {
      margin-bottom: 8px;
      color: #333;
    }

    .modal-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 16px;
      padding-top: 20px;
      border-top: 2px solid #eee;
      margin-top: 8px;
    }

    .modal-stat-label {
      display: block;
      font-size: 0.78rem;
      color: #888;
      margin-bottom: 4px;
    }

    .modal-stat-value {
      font-size: 1.25rem;
      font-weight: 800;
      color: #1a1a1a;
    }

    @media (max-width: 768px) {
      body { padding: 24px 16px 40px; }

      .cases-grid {
        grid-template-columns: 1fr;
        max-width: 420px;
        margin: 0 auto;
      }

      .case-card:hover,
      .case-card:focus-visible { transform: scale(1.03); }

      .modal-dialog { padding: 24px 20px 20px; }
    }
  </style>
</head>
<body>

<div class="container">
  <header class="header">
    <h1>Наши успешные кейсы</h1>
    <p>Результаты работы с трафиком и автоворонками</p>
  </header>

  <p class="hint">Наведите, чтобы рассмотреть · Нажмите, чтобы открыть подробности</p>

  <main class="cases-grid" id="cases-grid"></main>

  <footer class="site-footer">
    <div class="footer-actions">
      <a class="btn btn-primary" href="recent.html">Более поздние кейсы →</a>
    </div>
    <p>Трафик · автоворонки · лидогенерация</p>
  </footer>
</div>

<div id="case-modal" class="modal" hidden>
  <div class="modal-backdrop"></div>
  <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <button class="modal-close" type="button" aria-label="Закрыть">&times;</button>
    <h2 class="modal-title" id="modal-title"></h2>
    <div class="modal-tags"></div>
    <div class="modal-body"></div>
    <div class="modal-stats"></div>
  </div>
</div>

<script src="js/cases-data.js"></script>
<script src="js/sort-utils.js"></script>
<script>
  const grid = document.getElementById("cases-grid");
  const sortedCases = window.sortByRevenueDesc(window.CASES_DATA, (item) => {
    const stats = item.stats || {};
    return window.parseMoneyValue(stats.revenue) || window.parseMoneyValue(stats.budget);
  });

  sortedCases.forEach((item) => {
    const card = document.createElement("button");
    card.className = "case-card";
    card.type = "button";
    card.dataset.case = item.id;
    card.setAttribute("aria-label", "Открыть кейс: " + item.title);
    card.innerHTML = `<img src="${item.image}" alt="${item.title}" loading="lazy" width="730" height="1022">`;
    grid.appendChild(card);
  });
</script>
<script src="js/main.js"></script>
</body>
</html>
