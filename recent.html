<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Более ранние кейсы — Трафик и Воронки</title>
  <meta name="description" content="Кейсы по запускам и evergreen-воронкам — бюджет, выручка, CAC, LTV, ROMI.">
  <style>
    :root {
      --bg-color: #1a1a1a;
      --card-bg: #262626;
      --text-main: #f0f0f0;
      --text-muted: #a3a3a3;
      --accent-orange: #ff5722;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 40px 20px 60px;
      background: var(--bg-color);
      color: var(--text-main);
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
    }

    .container { max-width: 1100px; margin: 0 auto; }

    .header { margin-bottom: 40px; }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--accent-orange);
      text-decoration: none;
      font-size: 0.95rem;
      margin-bottom: 20px;
    }

    .back-link:hover { text-decoration: underline; }

    .header h1 {
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      margin: 0 0 10px;
      color: #fff;
    }

    .header p {
      color: var(--text-muted);
      margin: 0;
    }

    .sheet-section { margin-bottom: 48px; }

    .sheet-title {
      font-size: 1.35rem;
      color: #fff;
      margin: 0 0 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--accent-orange);
    }

    .sheet-empty {
      color: var(--text-muted);
      margin: 0;
      padding: 20px;
      background: var(--card-bg);
      border-radius: 12px;
    }

    .cases-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .recent-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 24px 28px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .recent-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(255, 87, 34, 0.12);
    }

    .recent-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .recent-card h3 {
      margin: 0;
      font-size: 1.15rem;
      color: #fff;
      flex: 1;
      min-width: 200px;
    }

    .type-badge {
      background: var(--accent-orange);
      color: #fff;
      padding: 4px 14px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 16px;
      margin-bottom: 16px;
    }

    .stat-item label {
      display: block;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .stat-item span {
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
    }

    .stat-item .romi { color: var(--accent-orange); }

    .recent-note {
      margin: 0 0 16px;
      color: var(--text-muted);
      font-size: 0.92rem;
    }

    .btn-miro {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 22px;
      border-radius: 999px;
      background: var(--accent-orange);
      color: #fff;
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 700;
      box-shadow: 0 4px 18px rgba(255, 87, 34, 0.35);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn-miro:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(255, 87, 34, 0.45);
    }

    @media (max-width: 768px) {
      body { padding: 24px 16px 40px; }
      .recent-card { padding: 20px; }
    }
  </style>
</head>
<body>

<div class="container">
  <header class="header">
    <a class="back-link" href="index.html">← Все кейсы</a>
    <h1>Более ранние кейсы</h1>
    <p>Запуски и evergreen-воронки с цифрами</p>
  </header>

  <main id="recent-list"></main>
</div>

<script src="js/cases-data.js"></script>
<script src="js/sort-utils.js"></script>
<script src="js/recent.js"></script>
</body>
</html>
